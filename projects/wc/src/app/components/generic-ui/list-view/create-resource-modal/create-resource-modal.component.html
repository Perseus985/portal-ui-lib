<ui5-dialog
  test-id="create-resource-dialog"
  [open]="dialogOpen()"
  (close)="close()"
>
  <ui5-bar slot="header" design="Header">
    <ui5-title test-id="create-resource-dialog-title" slot="startContent">
      @if (isEditMode()) {
        Edit
      } @else {
        Create
      }
    </ui5-title>
  </ui5-bar>

  <pm-generic-form
    test-id="create-resource-dialog-form"
    [fields]="formFields()"
    [initialValues]="formInitialValues()"
    [editMode]="isEditMode()"
    (formValue)="onFormValue($event)"
    (formValidChange)="onFormValidChange($event)"
  />

  <ui5-toolbar class="ui5-content-density-compact" slot="footer">
    <ui5-toolbar-button
      test-id="create-resource-submit"
      class="dialogCloser"
      design="Emphasized"
      text="Submit"
      [disabled]="!isFormValid()"
      (click)="submit()"
    >
    </ui5-toolbar-button>
    <ui5-toolbar-button
      test-id="create-resource-cancel"
      class="dialogCloser"
      design="Transparent"
      text="Cancel"
      (click)="close()"
    >
    </ui5-toolbar-button>
  </ui5-toolbar>
</ui5-dialog>

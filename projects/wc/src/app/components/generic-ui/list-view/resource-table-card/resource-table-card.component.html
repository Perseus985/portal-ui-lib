<mfp-declarative-table-card
  data-testid="generic-list-view-table"
  [resources]="resources()"
  [config]="config()"
  [createFormState]="createFormState()"
  (tableRowClicked)="navigateToResource($event)"
  (loadMoreResources)="loadMore()"
  (paginationLimitChanged)="onLimitChange($event)"
  (actionButtonClick)="executeAction($event)"
  (createFieldChange)="onCreateFieldChange($event)"
  (createSubmit)="onCreateSubmit($event)"
/>
